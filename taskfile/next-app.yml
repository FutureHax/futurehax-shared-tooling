version: "3"

tasks:
  # Husky
  husky:commit-msg:
    silent: true
    cmds:
      - ./.shared-tooling/husky/commit-msg.sh

  husky:pre-commit:
    silent: true
    cmds:
      - ./.shared-tooling/husky/pre-commit.sh

  # Dependencies
  dependencies:install:
    silent: true
    desc: "Install Node.js dependencies"
    cmds:
      - |
        if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - npm run prepare

  # Next.js dev / build
  dev:
    desc: "Start the Next.js dev server"
    cmds:
      - npm run dev

  build:
    desc: "Build the Next.js app"
    cmds:
      - npm run build

  lint:
    desc: "Run ESLint"
    cmds:
      - npm run lint

  type-check:
    desc: "Run TypeScript type checking"
    cmds:
      - npm run type-check

  test:
    desc: "Run tests"
    cmds:
      - npm test

  test:run:
    desc: "Run tests once"
    cmds:
      - npm run test:run

  # Prisma
  db:generate:
    desc: "Generate the Prisma client"
    cmds:
      - npm run db:generate

  db:migrate:
    desc: "Run Prisma migrations (dev)"
    cmds:
      - npm run db:migrate

  db:seed:
    desc: "Seed the database"
    cmds:
      - npm run db:seed

  # Release
  release:
    desc: "Create a new release using semantic-release"
    env:
      GITHUB_TOKEN: "{{.GITHUB_TOKEN}}"
      GH_TOKEN: "{{.GITHUB_TOKEN}}"
    cmds:
      - |
        if [ -z "$GITHUB_TOKEN" ]; then
          echo "ERROR: GITHUB_TOKEN is required. Set it in your .env file"
          exit 1
        fi
      - npx semantic-release
