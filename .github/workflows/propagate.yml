name: Propagate to fleet

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dispatch bump event to all consumers
        env:
          GH_TOKEN: ${{ secrets.FLEET_PAT }}
        run: |
          REPOS=(
            pb-naval-combat-overlay
            chaos-survival-mode
            foundry-character-vault-module
            jr-foundry-bridge
            scattered-seafloor-module
            saltwater-sacrament-module
            pb-wind-manager
            pb-sea-travel
            pb-job-board
            pb-potion-bench
            pb-combat-helper-overlay
            pb-derelict-staging
            pb-shanty-engine
            pb-storm-generator
            pb-suite-manager
            pb-tavern-plus
            pb-treasure-staging
            Pirate-Borg-Crew-and-Ship-Manager
            Me-Beloved-SHIP
            Death-Effect-Reminder
            foundry-mob-actor
            pirate-borg-content-importer-module
            pirate-borg-statblock-importer
            pirate-borg-loot-sheet-npc
            item-piles-pirateborg-module
            brightbeard-pirate-borg-adventure-module
            Foundry-Module-Template
            foundry-adventure-module-template
            pb-pirate-forge
          )

          COMMIT_SHA="${{ github.sha }}"
          for repo in "${REPOS[@]}"; do
            echo "Dispatching to FutureHax/$repo..."
            gh api "repos/FutureHax/$repo/dispatches" \
              -f event_type=bump-shared-tooling \
              -f "client_payload[sha]=$COMMIT_SHA" \
              || echo "  WARN: dispatch failed for $repo"
          done
          echo "Done. Dispatched to ${#REPOS[@]} repos."
